services:
  postgres:
    image: postgres:16-alpine
    container_name: drivesure_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: drivesure
      POSTGRES_PASSWORD: drivesure_secret
      POSTGRES_DB: drivesure
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
